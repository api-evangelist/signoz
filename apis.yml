apis:
- aid: signoz:signoz
  name: SigNoz
  description: The SigNoz REST API provides programmatic access to the SigNoz observability platform. The API enables management
    of alerts, dashboards, notification channels, cloud integrations, users, organizations, service accounts, and ingestion
    keys. It also exposes query endpoints for traces, logs, metrics, and infrastructure monitoring data. The API uses API
    key authentication via the SigNoz-Api-Key header.
  humanURL: https://signoz.io
