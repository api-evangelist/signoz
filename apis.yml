aid: signoz
name: SigNoz
description: >-
  SigNoz is an open source observability platform with logs, traces, and metrics
  in a single pane, built natively on OpenTelemetry. It is a full-stack
  open-source APM and observability tool that serves as an open-source alternative
  to DataDog, NewRelic, and other proprietary monitoring solutions. SigNoz provides
  distributed tracing, log management, infrastructure monitoring, and alerting
  capabilities unified under a single interface.
