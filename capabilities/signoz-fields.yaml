      call: signoz-fields.getfieldsvalues
      with:
        signal: tools.signal
        source: tools.source
        limit: tools.limit
        startUnixMilli: tools.startUnixMilli
        endUnixMilli: tools.endUnixMilli
        fieldContext: tools.fieldContext
