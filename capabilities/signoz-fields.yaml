naftiko: 1.0.0-alpha2
info:
  label: SigNoz — fields
  description: 'SigNoz — fields. 2 operations. Lead operation: Get field keys. Self-contained Naftiko capability covering
    one Signoz business surface.'
  tags:
  - Signoz
  - fields
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SIGNOZ_API_KEY: SIGNOZ_API_KEY
capability:
