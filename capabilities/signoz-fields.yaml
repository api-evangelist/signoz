    baseUri: https://{host}:{port}{base_path}
    description: SigNoz — fields business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-fields-keys
      path: /api/v1/fields/keys
      operations:
      - name: getfieldskeys
        method: GET
        description: Get field keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: signal
          in: query
          type: string
        - name: source
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: startUnixMilli
          in: query
          type: integer
        - name: endUnixMilli
          in: query
          type: integer
        - name: fieldContext
          in: query
          type: string
        - name: fieldDataType
          in: query
          type: string
        - name: metricName
          in: query
          type: string
        - name: metricNamespace
          in: query
          type: string
        - name: searchText
          in: query
          type: string
    - name: api-v1-fields-values
      path: /api/v1/fields/values
      operations:
      - name: getfieldsvalues
        method: GET
        description: Get field values
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: signal
          in: query
          type: string
        - name: source
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: startUnixMilli
          in: query
          type: integer
        - name: endUnixMilli
          in: query
          type: integer
        - name: fieldContext
          in: query
          type: string
        - name: fieldDataType
          in: query
          type: string
        - name: metricName
          in: query
          type: string
        - name: metricNamespace
          in: query
          type: string
        - name: searchText
          in: query
          type: string
        - name: name
          in: query
          type: string
        - name: existingQuery
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.SIGNOZ_API_KEY}}'
  exposes:
  - type: rest
    namespace: signoz-fields-rest
    port: 8080
    description: REST adapter for SigNoz — fields. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/v1/fields/keys
      name: api-v1-fields-keys
      description: REST surface for api-v1-fields-keys.
      operations:
      - method: GET
        name: getfieldskeys
        description: Get field keys
        call: signoz-fields.getfieldskeys
        with:
          signal: rest.signal
          source: rest.source
          limit: rest.limit
          startUnixMilli: rest.startUnixMilli
          endUnixMilli: rest.endUnixMilli
