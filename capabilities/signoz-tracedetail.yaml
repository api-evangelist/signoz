naftiko: 1.0.0-alpha2
info:
  label: SigNoz — tracedetail
  description: 'SigNoz — tracedetail. 1 operations. Lead operation: Get waterfall view for a trace. Self-contained Naftiko
    capability covering one Signoz business surface.'
  tags:
  - Signoz
  - tracedetail
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SIGNOZ_API_KEY: SIGNOZ_API_KEY
capability:
  consumes:
  - type: http
    namespace: signoz-tracedetail
    baseUri: https://{host}:{port}{base_path}
    description: SigNoz — tracedetail business capability. Self-contained, no shared references.
    resources:
    - name: api-v3-traces-traceID-waterfall
      path: /api/v3/traces/{traceID}/waterfall
      operations:
      - name: getwaterfall
        method: POST
        description: Get waterfall view for a trace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: traceID
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.SIGNOZ_API_KEY}}'
  exposes:
  - type: rest
    namespace: signoz-tracedetail-rest
    port: 8080
    description: REST adapter for SigNoz — tracedetail. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/v3/traces/{traceid}/waterfall
      name: api-v3-traces-traceid-waterfall
      description: REST surface for api-v3-traces-traceID-waterfall.
      operations:
      - method: POST
        name: getwaterfall
        description: Get waterfall view for a trace
        call: signoz-tracedetail.getwaterfall
        with:
          traceID: rest.traceID
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: signoz-tracedetail-mcp
    port: 9090
    transport: http
    description: MCP adapter for SigNoz — tracedetail. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-waterfall-view-trace
      description: Get waterfall view for a trace
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: signoz-tracedetail.getwaterfall
      with:
        traceID: tools.traceID
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
