      operations:
      - name: inspectmetrics
        method: POST
        description: Inspect raw metric data points
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
