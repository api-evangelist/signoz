        - name: start
          in: query
          type: integer
        - name: end
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: searchText
          in: query
          type: string
        - name: source
          in: query
          type: string
    - name: api-v2-metrics-inspect
