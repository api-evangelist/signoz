naftiko: 1.0.0-alpha2
info:
  label: SigNoz — health
  description: 'SigNoz — health. 3 operations. Lead operation: Health check. Self-contained Naftiko capability covering one
    Signoz business surface.'
  tags:
  - Signoz
  - health
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SIGNOZ_API_KEY: SIGNOZ_API_KEY
capability:
  consumes:
  - type: http
    namespace: signoz-health
    baseUri: https://{host}:{port}{base_path}
    description: SigNoz — health business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-healthz
      path: /api/v2/healthz
      operations:
      - name: healthz
        method: GET
        description: Health check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v2-livez
      path: /api/v2/livez
      operations:
      - name: livez
        method: GET
        description: Liveness check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v2-readyz
      path: /api/v2/readyz
      operations:
      - name: readyz
        method: GET
        description: Readiness check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SIGNOZ_API_KEY}}'
  exposes:
  - type: rest
    namespace: signoz-health-rest
    port: 8080
    description: REST adapter for SigNoz — health. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/v2/healthz
      name: api-v2-healthz
      description: REST surface for api-v2-healthz.
      operations:
      - method: GET
        name: healthz
        description: Health check
        call: signoz-health.healthz
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/livez
      name: api-v2-livez
      description: REST surface for api-v2-livez.
      operations:
      - method: GET
        name: livez
        description: Liveness check
        call: signoz-health.livez
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/readyz
      name: api-v2-readyz
      description: REST surface for api-v2-readyz.
      operations:
      - method: GET
        name: readyz
        description: Readiness check
        call: signoz-health.readyz
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: signoz-health-mcp
    port: 9090
    transport: http
    description: MCP adapter for SigNoz — health. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: health-check
      description: Health check
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: signoz-health.healthz
      outputParameters:
      - type: object
        mapping: $.
    - name: liveness-check
      description: Liveness check
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: signoz-health.livez
      outputParameters:
      - type: object
        mapping: $.
    - name: readiness-check
      description: Readiness check
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: signoz-health.readyz
      outputParameters:
      - type: object
        mapping: $.
